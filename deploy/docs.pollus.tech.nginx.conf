# /etc/nginx/sites-available/docs.valyd.work
# Static SPA (Vite/React build in dist/) for the Valyd documentation site.
# Pure static files — no app server. Client-side routing => SPA fallback.
#
# HTTP-only on purpose: `certbot --nginx` injects the 443 block + redirect.
#
# Order of operations:
#   1) DNS A record:  docs.valyd.work -> 96.250.208.62   (REQUIRED FIRST)
#   2) cd /var/www/pollus_main_servers/docs.valyd.work && bun run build   (or: npm run build)
#   3) sudo bash deploy/go-live.sh

server {
    listen 80;
    listen [::]:80;
    server_name docs.valyd.work;

    root /var/www/pollus_main_servers/docs.valyd.work/dist;
    index index.html;

    client_max_body_size 10M;

    location ^~ /.well-known/acme-challenge/ { allow all; }

    # Hashed, immutable build assets.
    location ~* \.(js|css|woff2?|ttf|otf|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA: every other path serves index.html (never cache it).
    location / {
        try_files $uri /index.html;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    access_log /var/log/nginx/docs_pollus_access.log;
    error_log  /var/log/nginx/docs_pollus_error.log;
}
